<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AquiReminder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="alert-body">
    <main class="card card--alert">
      <img class="alert-icon" src="drop.png" alt="" />
      <h2 class="alert-title" data-i18n="timeToHydrate">Time to hydrate!</h2>
      <p class="alert-subtitle" data-i18n="didYouDrink">
        Did you drink your water?
      </p>
      <div class="alert-actions">
        <button class="btn btn-primary" id="dismiss" type="button">
          <span data-i18n="drankWater">I drank water!</span>
        </button>
        <button class="btn btn-ghost hidden" id="playSound" type="button">
          <span data-i18n="playSound">Play reminder sound</span>
        </button>
      </div>
      <audio id="alertSound" src="alert.mp3" preload="auto"></audio>
    </main>
    <script src="i18n.js"></script>
    <script src="alert.js"></script>
  </body>
</html>
